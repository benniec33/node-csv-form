<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React CSV Form</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
      form { display: flex; flex-direction: column; gap: 10px; max-width: 320px; }
      input { padding: 8px; }
      button { padding: 10px; cursor: pointer; }
      .message { margin-top: 12px; color: green; }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
      pre { background: #f5f5f5; padding: 10px; border-radius: 4px; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="/src/reactApp.js"></script>
  </body>
</html>
